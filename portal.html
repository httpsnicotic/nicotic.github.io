<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NICOTIC Portal</title>

<style>

body{
background:black;
color:white;
font-family:Arial,sans-serif;

display:flex;
flex-direction:column;
align-items:center;

min-height:100vh;

padding:30px;
}

h1{
font-size:3rem;
margin-bottom:10px;
}

p{
margin-bottom:40px;
color:#bbb;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;

width:100%;
max-width:900px;
}

.card{
background:#111;

border:1px solid #7a2cff;

padding:20px;

border-radius:15px;

text-align:center;
}

</style>

</head>

<body>

<h1>NICOTIC</h1>

<p>Bienvenidos al sótano de Nico</p>

<div class="menu">

<div class="card">📢 Noticias</div>

<div class="card">🎥 Videos</div>

<div class="card">🌎 Horarios</div>

<div class="card">👥 Comunidad</div>

<div class="card">⌨️ Terminal</div>

<div class="card">⏳ Eventos</div>

</div>

</body>
</html>
