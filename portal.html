<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>NICOTIC Portal</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:black;
color:white;

}

/* HEADER INICIAL */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:4rem;
}

.hero p{
color:#bbb;
}

/* SECCIONES */
.section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

border-top:1px solid rgba(255,255,255,0.1);
}

.section h2{
font-size:3rem;
margin-bottom:10px;
}

.section p{
color:#aaa;
}

/* colores suaves de separación */
.section:nth-child(even){

}

</style>

</head>

<body>

<div class="hero">
<h1>NICOTIC</h1>

<div class="section">
<h2>📢 Noticias</h2>

</div>

<div class="section">

</div>

<div class="section">

<p>7:30 PM Perú</p>
</div>

<div class="section">
<h2>👥 Comunidad</h2>

</div>

<div class="section">

</div>

</html>
