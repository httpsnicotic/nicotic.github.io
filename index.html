<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NICOTIC</title>

<style>

*{

padding:0;
box-sizing:border-box;

}

height:100vh;
overflow:hidden;
display:flex;

}

}

}

<h1>NICOTIC</h1>

<p>Bienvenidos al sótano de Nico</p>
