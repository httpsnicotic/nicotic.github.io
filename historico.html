<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historial de Videos en Drive NICOTIC</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #050505;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(124, 58, 237, 0.18), transparent 38%),
        linear-gradient(180deg, rgba(0,0,0,.65), rgba(0,0,0,.92)),
        url("ojo.jpg") center/cover no-repeat;
      z-index: 0;
      pointer-events: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .center {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      width: 100%;
      padding: 24px;
    }

    .card {
      width: min(620px, 92vw);
      padding: 34px 24px;
      border-radius: 30px;
      background: rgba(10,10,14,.72);
      border: 1px solid rgba(168,85,247,.22);
      box-shadow:
        0 0 38px rgba(124,58,237,.18),
        0 24px 80px rgba(0,0,0,.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(124,58,237,.20);
      border: 1px solid rgba(168,85,247,.35);
      color: #d8b4fe;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 2.3px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(2.2rem, 9vw, 4rem);
      line-height: .98;
      margin: 0 0 16px;
      letter-spacing: -1px;
      font-weight: 900;
      color: white;
    }

    p {
      color: #cfcfcf;
      font-size: 17px;
      line-height: 1.45;
      margin: 0 0 26px;
    }

    .btn {
      width: 100%;
      max-width: 360px;
      padding: 15px 22px;
      background: linear-gradient(135deg, #5b21b6, #7c3aed, #a855f7);
      color: white;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 900;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 24px rgba(124, 58, 237, 0.5);
      transition: 0.25s ease;
    }

    .btn:hover {
      transform: scale(1.04);
      box-shadow: 0 0 34px rgba(124, 58, 237, 0.8);
    }

    .back {
      margin-top: 14px;
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
    }

    .back:hover {
      color: white;
    }
  </style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="center">
  <div class="card">
    <div class="kicker">📁 Episodios anteriores</div>

    <h1>Historial de Videos en Drive</h1>

    <p>
      Accede a todos los episodios antiguos desde la carpeta oficial de NICOTIC.
    </p>

    <a class="btn" href="https://drive.google.com/drive/folders/1S0G7tm3z2YqHhMGmbyfCnq1WyoJJER_9?usp=sharing" target="_blank" rel="noopener noreferrer">
      Abrir historial en Drive
    </a>

    <a class="back" href="portal.html">Volver al portal</a>
  </div>
</div>

<script>
  const canvas = document.getElementById("particles");
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();

  let particles = [];

  function createParticles() {
    particles = [];

    for (let i = 0; i < 55; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1,
        dx: (Math.random() - 0.5) * 0.55,
        dy: (Math.random() - 0.5) * 0.55
      });
    }
  }

  createParticles();

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#a78bfa";

    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();

      p.x += p.dx;
      p.y += p.dy;

      if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(animate);
  }

  animate();

  window.addEventListener("resize", () => {
    resizeCanvas();
    createParticles();
  });
</script>

</body>
</html>
