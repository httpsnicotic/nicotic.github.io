<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histórico NICOTIC</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
padding:30px;
}

h1{
font-size:3rem;
margin-bottom:20px;
}

/* 🔍 SEARCH */
#search{
width:100%;
max-width:400px;
padding:10px;
margin-bottom:20px;
background:#111;
color:white;
border:1px solid #333;
border-radius:6px;
}

/* 🎛️ FILTROS */
.filtros{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.filtros button{
background:#111;
color:white;
border:1px solid #333;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.filtros button:hover{
background:#222;
transform:scale(1.05);
}

.filtros button:active{
transform:scale(0.95);
}

/* 📦 CONTENIDO */
.row{
margin-bottom:30px;
}

.row h2{
margin-bottom:10px;
}

/* 🎬 SCROLL STYLE NETFLIX */
.scroll{
display:flex;
overflow-x:auto;
gap:10px;
padding-bottom:10px;
scroll-behavior:smooth;
}

/* 🎥 CARD */
.card{
min-width:200px;
background:#111;
border:1px solid #222;
border-radius:10px;
cursor:pointer;
flex-shrink:0;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
border-color:#444;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px 10px 0 0;
}

.card p{
padding:8px;
font-size:14px;
}
</style>

</head>

<body>

<h1>📁 Histórico NICOTIC</h1>

<!-- 🔍 BUSCADOR -->
<input id="search" placeholder="Buscar episodio...">

<!-- 🎛️ FILTROS -->
<div class="filtros">
  <button onclick="cambiarFiltro('todos')">Todos</button>
  <button onclick="cambiarFiltro('local')">Recientes</button>
  <button onclick="cambiarFiltro('drive')">Archivo</button>
</div>

<!-- 📦 CONTENEDOR -->
<div id="container"></div>

<!-- ⚙️ LÓGICA -->
<script src="script.js"></script>

</body>
</html>
