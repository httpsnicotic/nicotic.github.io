<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histórico NICOTIC</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
padding:30px;
}

h1{
font-size:3rem;
margin-bottom:20px;
}

#search{
width:100%;
max-width:400px;
padding:10px;
margin-bottom:20px;
background:#111;
color:white;
border:1px solid #333;
border-radius:6px;
}

.row{
margin-bottom:30px;
}

.row h2{
margin-bottom:10px;
}

.scroll{
display:flex;
overflow-x:auto;
gap:10px;
padding-bottom:10px;
}

.card{
min-width:200px;
background:#111;
border:1px solid #222;
border-radius:10px;
cursor:pointer;
flex-shrink:0;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px 10px 0 0;
}

.card p{
padding:8px;
font-size:14px;
}
</style>

</head>

<body>

<h1>📁 Histórico NICOTIC</h1>

<input id="search" placeholder="Buscar episodio...">

<div id="container"></div>

<script src="historico.js"></script>

</body>
</html>
