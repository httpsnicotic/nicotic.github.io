<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Histórico NICOTIC</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#000;
color:white;
font-family:Arial,Helvetica,sans-serif;
padding:30px;

}

h1{

font-size:3rem;
margin-bottom:25px;

}

#search{

width:100%;
max-width:450px;
padding:12px;
margin-bottom:35px;

background:#111;

color:white;

border:1px solid #333;

border-radius:8px;

font-size:16px;

}

.year{

margin-bottom:35px;

}

.year h1{

font-size:2rem;

color:#b84dff;

margin-bottom:15px;

}

.folder{

cursor:pointer;

background:#111;

padding:15px;

border-radius:10px;

border:1px solid #2b2b2b;

margin-bottom:10px;

transition:.2s;

user-select:none;

}

.folder:hover{

background:#1a1a1a;

border-color:#7b2cff;

}

.scroll{

display:none;

overflow-x:auto;

gap:15px;

padding:15px 0;

scroll-behavior:smooth;

}

.card{

min-width:220px;

background:#111;

border-radius:10px;

overflow:hidden;

cursor:pointer;

border:1px solid #222;

transition:.2s;

}

.card:hover{

transform:scale(1.05);

border-color:#7b2cff;

}

.card img{

width:100%;

height:130px;

object-fit:cover;

display:block;

}

.card p{

padding:10px;

text-align:center;

}

</style>

</head>

<body>

<h1>📁 Histórico NICOTIC</h1>

<input
id="search"
type="text"
placeholder="Buscar episodio..."
>

<div id="container"></div>

<script src="historico.js"></script>

</body>

</html>
