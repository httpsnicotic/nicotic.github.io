<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Histórico NICOTIC</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      width: 90%;
      max-width: 600px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 15px;
      letter-spacing: 2px;
    }

    p {
      color: #cfcfcf;
      font-size: 18px;
      margin-bottom: 25px;
    }

    .btn {
      padding: 14px 28px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
      transition: 0.3s;
    }

    .btn:hover {
      background: #5b21b6;
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.8);
    }
  </style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="center">
  <h1>Histórico NICOTIC</h1>
  <p>Accede a todos los episodios antiguos desde nuestra carpeta oficial.</p>

  <a class="btn" href="https://drive.google.com/" target="_blank">
    Ver videos antiguos
  </a>
</div>

<script>
  const canvas = document.getElementById("particles");
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();

  let particles = [];

  function createParticles() {
    particles = [];

    for (let i = 0; i < 70; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1,
        dx: (Math.random() - 0.5) * 0.6,
        dy: (Math.random() - 0.5) * 0.6
      });
    }
  }

  createParticles();

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#a78bfa";

    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();

      p.x += p.dx;
      p.y += p.dy;

      if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(animate);
  }

  animate();

  window.addEventListener("resize", () => {
    resizeCanvas();
    createParticles();
  });
</script>

</body>
</html>
